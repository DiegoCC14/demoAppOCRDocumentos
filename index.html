<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 - Auto-Captura de Documentos</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Ahora ocultamos el video original */
        video { display: none; } 
        
        /* Y mostramos el canvas para poder dibujar los bordes detectados encima */
        canvas { width: 100%; max-width: 400px; border: 2px solid #333; border-radius: 8px; } 
        
        #resultado { max-width: 100%; max-width: 400px; border: 3px solid #4CAF50; border-radius: 8px; margin-top: 20px; display: none; }
        h2 { color: #333; }
        #status { font-weight: bold; color: #d9534f; padding: 10px; }
    </style>

    <!-- 1. Cargamos OpenCV.js (Motor matem�tico de visi�n por computadora) -->
    <script src="https://docs.opencv.org/4.7.0/opencv.js" type="text/javascript"></script>
    <!-- 2. Cargamos jscanify (Librer�a para detectar y recortar el papel) -->
    <script src="https://cdn.jsdelivr.net/gh/ColonelParrot/jscanify@master/src/jscanify.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>Esc�ner Inteligente</h2>
        <p id="status">Cargando librer�as (OpenCV pesa un poco, espera)...</p>
        
        <!-- Video en vivo -->
        <video id="video" autoplay playsinline></video>
        
        <!-- Canvas oculto para procesar cada cuadro -->
        <canvas id="canvas"></canvas>
        
        <!-- Imagen final recortada -->
        <img id="resultado" alt="Documento Recortado" />
    </div>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const resultadoImg = document.getElementById("resultado");
        const statusText = document.getElementById("status");
    
        let scanner;
        let framesEstables = 0;
        let procesando = true;
    
        // Usamos video: true para PC. Si estás en móvil, usa { facingMode: "environment" }
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                statusText.innerText = "Error: No se pudo acceder a la cámara.";
            });
    
        cv['onRuntimeInitialized'] = () => {
            scanner = new jscanify();
            statusText.innerText = "Apunta a una hoja sobre un fondo oscuro...";
            statusText.style.color = "#f0ad4e";
            requestAnimationFrame(analizarFrame);
        };
    
        function analizarFrame() {
            if (!procesando) return;
    
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // 1. Dibujamos el video crudo en el canvas
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
                try {
                    // 2. Intentamos resaltar el papel (dibuja el contorno)
                    const canvasResaltado = scanner.highlightPaper(canvas);
                    
                    // Sobrescribimos el canvas visible con la imagen que tiene el borde dibujado
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(canvasResaltado, 0, 0);
    
                    // 3. Intentamos extraer el papel para validar que realmente es un documento
                    const papelExtraido = scanner.extractPaper(canvas, 600, 800);
    
                    // Si no hay errores hasta aquí, significa que detectó la hoja correctamente
                    framesEstables++;
                    statusText.innerText = `¡Hoja detectada! Quédate quieto... (${framesEstables}/15)`;
                    statusText.style.color = "#0275d8";
    
                    if (framesEstables >= 15) {
                        procesando = false; 
                        statusText.innerText = "¡Foto capturada con éxito!";
                        statusText.style.color = "#5cb85c";
                        
                        resultadoImg.src = papelExtraido.toDataURL("image/jpeg");
                        resultadoImg.style.display = "block";
                        canvas.style.display = "none"; // Ocultamos la cámara en vivo
                        
                        video.srcObject.getTracks().forEach(track => track.stop());
                    }
                } catch (e) {
                    // Si no detecta los 4 bordes de la hoja, entra aquí
                    framesEstables = 0;
                    statusText.innerText = "Buscando la hoja... (Asegura un buen contraste)";
                    statusText.style.color = "#d9534f";
                }
            }
            
            if(procesando) {
                requestAnimationFrame(analizarFrame);
            }
        }
    </script>
</body>
</html>
